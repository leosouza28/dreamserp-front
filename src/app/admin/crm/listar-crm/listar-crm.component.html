<div class="container-fluid">
    <div class="row">
        <div class="col-12">
            <h1 class="fw-bold">CRM</h1>
        </div>
        <div class="col-12">
            <div class="card border-0 shadow-sm crm-list-card">
                <form [formGroup]="form" (submit)="query()" class="p-3 crm-list-form">
                    <div class="row row-gap-3 mb-3">
                        <div class="col-12 col-lg-6">
                            <label class="form-label">Buscar por</label>
                            <input type="text" class="form-control" formControlName="q"
                                placeholder="Nome ou documento">
                        </div>
                    </div>
                    <div class="d-flex flex-row flex-wrap align-items-start gap-2 crm-toolbar">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-search me-2"></i> Buscar
                        </button>
                        <div class="position-relative crm-filter-anchor">
                            <button type="button" class="btn btn-outline-secondary" title="Filtros"
                                (click)="toggleFilterPanel($event)">
                                <i class="bi bi-funnel"></i>
                            </button>
                            <div *ngIf="filterPanelOpen" class="crm-filter-panel" (click)="$event.stopPropagation()">
                                <div class="crm-filter-panel-inner">
                                    <h6 class="crm-filter-panel-title">
                                        Filtrar por tags
                                    </h6>
                                    <div *ngIf="tagOptionsLoading" class="text-muted small py-2">
                                        Carregando tags…
                                    </div>
                                    <div *ngIf="!tagOptionsLoading && tagCheckboxOptions.length === 0"
                                        class="text-muted small py-2">
                                        Nenhuma tag cadastrada nos CRMs.
                                    </div>
                                    <ul *ngIf="!tagOptionsLoading && tagCheckboxOptions.length > 0"
                                        class="list-unstyled mb-0 crm-filter-tag-list">
                                        <li *ngFor="let tag of tagCheckboxOptions" class="crm-filter-tag-item">
                                            <label class="crm-filter-tag-label">
                                                <input type="checkbox" class="form-check-input flex-shrink-0"
                                                    [checked]="isDraftTagSelected(tag)"
                                                    (change)="toggleDraftTag(tag, $any($event.target).checked)">
                                                <span class="crm-filter-tag-text">{{ tag }}</span>
                                            </label>
                                        </li>
                                    </ul>
                                    <div class="crm-filter-panel-actions">
                                        <button type="button" class="btn btn-primary" (click)="aplicarFiltros()">
                                            Filtrar
                                        </button>
                                        <button type="button" class="btn btn-outline-secondary"
                                            (click)="limparFiltros()">
                                            Limpar
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <button type="button" class="btn btn-success"
                            [routerLink]="['/admin/crm/form']">
                            <i class="bi bi-plus-lg me-2"></i> Adicionar
                        </button>
                    </div>
                </form>
                <div class="px-3 table-responsive">
                    <table-template [total]="data.total" [loading]="loading" [paginacaoAtiva]="true">
                        <table class="table table-borderless table-hover border-bottom">
                            <thead class="table-dark">
                                <tr>
                                    <th>Nome</th>
                                    <th>CPF/CNPJ</th>
                                    <th>Tags</th>
                                    <th class="text-end">Criado em</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr *ngFor="let item of data.lista" class="cursor-pointer"
                                    (click)="abrirCrm(item)">
                                    <td>{{ item.nome }}</td>
                                    <td>{{ item.documento | cpfCnpj }}</td>
                                    <td>
                                        <div class="d-flex flex-wrap gap-1" *ngIf="item.tags?.length > 0">
                                            <span *ngFor="let tag of item.tags"
                                                class="badge rounded-pill bg-success px-2 py-1">
                                                {{ tag.key }}
                                            </span>
                                        </div>
                                    </td>
                                    <td class="text-end">{{ item.created_at | dateSimple }}</td>
                                </tr>
                            </tbody>
                        </table>
                    </table-template>
                </div>
            </div>
        </div>
    </div>
</div>
